<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ocean Color Scheme - Arsenii Kosterin</title>
</head>
<body>
    <img src="ocean.jpg" alt="Clouds over the Atlantic Ocean" width="500">

    <table border="1">
        <tr>
            <th colspan="4" style="font-size:1.3em; font-style:italic;">Clouds Over the Atlantic</th>
        </tr>
        <tr>
            <td style="background-color: #1560A6; color: white;">Sky Blue</td>
            <td style="background-color: #1B4A6B; color: white;">Deep Ocean</td>
            <td style="background-color: #F0F0F0;">Cloud White</td>
            <td style="background-color: #5A98C0;">Horizon Blue</td>
        </tr>
        <tr>
            <td>#1560A6</td>
            <td>#1B4A6B</td>
            <td>#F0F0F0</td>
            <td>#5A98C0</td>
        </tr>
        <tr>
            <td>rgb(21, 96, 166)</td>
            <td>rgb(27, 74, 107)</td>
            <td>rgb(240, 240, 240)</td>
            <td>rgb(90, 152, 192)</td>
        </tr>
        <tr>
            <td>hsl(209, 78%, 37%)</td>
            <td>hsl(205, 60%, 26%)</td>
            <td>hsl(0, 0%, 94%)</td>
            <td>hsl(204, 44%, 55%)</td>
        </tr>
    </table>
</body>
</html>
