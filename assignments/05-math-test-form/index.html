<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Math Test</title>
</head>
<body>
    <h1>Online Math Test</h1>

    <form>
        <label for="name">Your Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <!--Start of Math Test-->

        <h2>Question 1</h2>
        <p>What is 12 &times; 8?</p>
        <input type="radio" id="q1a" name="q1" value="a">
        <label for="q1a">86</label><br>
        <input type="radio" id="q1b" name="q1" value="b">
        <label for="q1b">96</label><br>
        <input type="radio" id="q1c" name="q1" value="c">
        <label for="q1c">104</label><br>

        <h2>Question 2</h2>
        <p>What is 144 &divide; 12?</p>
        <input type="radio" id="q2a" name="q2" value="a">
        <label for="q2a">11</label><br>
        <input type="radio" id="q2b" name="q2" value="b">
        <label for="q2b">12</label><br>
        <input type="radio" id="q2c" name="q2" value="c">
        <label for="q2c">14</label><br>

        <h2>Question 3</h2>
        <p>Which value is &le; &frac12;?</p>
        <input type="radio" id="q3a" name="q3" value="a">
        <label for="q3a">0.6</label><br>
        <input type="radio" id="q3b" name="q3" value="b">
        <label for="q3b">0.5</label><br>
        <input type="radio" id="q3c" name="q3" value="c">
        <label for="q3c">0.75</label><br>

        <h2>Question 4 — Word Problem</h2>
        <p>A store sells notebooks for $3 each. If you buy 5 &plusmn; 1 notebooks, what is the range of the total cost? Show your work and explain your answer.</p>
        <textarea name="q4" rows="5" cols="50"></textarea><br><br>

        <input type="submit" value="Submit">

        <!--End of Math Test-->
    </form>
</body>
</html>
