<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stylish Schedule - Arsenii Kosterin</title>
    <style>
        table {
            border-collapse: collapse;
            width: 500px;
            font-family: Arial, sans-serif;
        }

        th {
            background-color: #1a237e;
            color: white;
            padding: 12px 16px;
            text-align: left;
        }

        td {
            padding: 10px 16px;
            border: 1px solid #bdbdbd;
        }

        .highlight {
            background-color: #fff9c4;
            font-weight: bold;
        }

        .time-col {
            background-color: #e3f2fd;
            width: 120px;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col class="time-col">
            <col>
        </colgroup>
        <tr>
            <th>Time</th>
            <th>Activity</th>
        </tr>
        <tr>
            <td>7:00 AM</td>
            <td>Morning Run</td>
        </tr>
        <tr>
            <td>8:00 AM</td>
            <td>Breakfast</td>
        </tr>
        <tr class="highlight">
            <td>9:00 AM</td>
            <td>Team Meeting</td>
        </tr>
        <tr>
            <td>10:30 AM</td>
            <td>Project Work</td>
        </tr>
        <tr>
            <td>12:00 PM</td>
            <td>Lunch Break</td>
        </tr>
        <tr class="highlight">
            <td>1:30 PM</td>
            <td>Client Presentation</td>
        </tr>
        <tr>
            <td>3:00 PM</td>
            <td>Code Review</td>
        </tr>
        <tr>
            <td>5:00 PM</td>
            <td>Gym Session</td>
        </tr>
        <tr>
            <td>7:00 PM</td>
            <td>Dinner with Friends</td>
        </tr>
    </table>
</body>
</html>
